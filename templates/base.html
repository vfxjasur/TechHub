<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
    <meta name="theme-color" content="#0a0a0f">
    <title>{% block title %}TechHub{% endblock %} | Интернет-магазин игровой периферии</title>
    <meta name="description" content="{% block description %}Купить механические клавиатуры, игровые мыши, наушники, коврики и аксессуары для ПК. Доставка по Узбекистану.{% endblock %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% include 'partials/header.html' %}

    {% if messages %}
    <div class="toast-container" id="toast-container">
        {% for message in messages %}
        <div class="toast toast-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}

    <main>
        {% block content %}{% endblock %}
    </main>

    {% include 'partials/footer.html' %}

    <script src="/static/js/main.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
