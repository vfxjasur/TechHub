{% extends 'base.html' %}

{% block title %}{{ t.contacts }}{% endblock %}

{% block content %}
<div class="page-content">
    <div class="container">
        <div class="page-header text-center">
            <h1>{{ t.contacts }}</h1>
            <p class="page-subtitle">Свяжитесь с нами</p>
        </div>

        <div class="contacts-grid">
            <div class="contacts-info">
                <a href="https://maps.google.com/maps?q=41.201083,69.239000" target="_blank" class="contact-card">
                    <div class="contact-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/></svg>
                    </div>
                    <div>
                        <p class="contact-label">Адрес</p>
                        <p class="contact-value">{{ t.address }}</p>
                    </div>
                </a>
                <a href="tel:+998771663323" class="contact-card">
                    <div class="contact-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13.832 16.568a1 1 0 0 0 1.213-.303l.355-.465A2 2 0 0 1 17 15h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2A18 18 0 0 1 2 4a2 2 0 0 1 2-2h3a2 2 0 0 1 2 2v3a2 2 0 0 1-.8 1.6l-.468.351a1 1 0 0 0-.292 1.233 14 14 0 0 0 6.392 6.384"/></svg>
                    </div>
                    <div>
                        <p class="contact-label">Телефон</p>
                        <p class="contact-value">{{ t.phone }}</p>
                    </div>
                </a>
                <div class="contact-card">
                    <div class="contact-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 6v6l4 2"/><circle cx="12" cy="12" r="10"/></svg>
                    </div>
                    <div>
                        <p class="contact-label">Часы работы</p>
                        <p class="contact-value">Пн-Сб: 11:00 - 21:00, Вс: Выходной</p>
                    </div>
                </div>
                <div class="contact-social">
                    <p>Мы в социальных сетях</p>
                    <div class="social-buttons">
                        <a href="https://t.me/jasurdv" target="_blank" class="btn-telegram">Telegram</a>
                        <a href="https://instagram.com/jasur.dvv1" target="_blank" class="btn-instagram">Instagram</a>
                    </div>
                </div>
            </div>

            <div class="map-container">
                <iframe src="https://maps.google.com/maps?q=41.2968,69.1800&z=16&output=embed" width="100%" height="100%" style="border:0" allowfullscreen loading="lazy"></iframe>
            </div>
        </div>
    </div>
</div>
{% endblock %}
